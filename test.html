<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>战国 · 抢单面板</title>
    <style>
        /* ----- 全局重置 & 字体 ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f1f5f9;
            color: #1e293b;
            line-height: 1.5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ----- 固定头部 (战国) ----- */
        .app-header {
            background-color: #1E9FFF;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            z-index: 10;
        }
        .app-header h3 {
            margin: 0;
            color: white;
            font-weight: 500;
            font-size: 1.3rem;
            letter-spacing: 1px;
        }

        /* ----- 标签栏 (三个选项) ----- */
        .tab-bar {
            display: flex;
            background: white;
            padding: 8px 12px 0 12px;
            gap: 8px;
            border-bottom: 1px solid #e2e8f0;
            flex-shrink: 0;
        }
        .tab-bar label {
            flex: 1;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 500;
            color: #1E9FFF;
            background: white;
            border: 2px solid #1E9FFF;
            border-radius: 30px 30px 0 0;
            border-bottom: none;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
        }
        .tab-bar label:hover {
            background: #e6f3ff;
        }

        /* 隐藏单选框 */
        input[name="sexx"] {
            display: none;
        }

        /* ----- 内容区域 (滚动) ----- */
        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            background: #f8fafc;
            scroll-behavior: smooth;
        }

        /* 所有标签页默认隐藏 */
        .tab-pane {
            display: none;
        }

        /* 根据选中状态显示对应标签页 */
        #qdsz:checked ~ .tab-content .pane-qdsz { display: block; }
        #qjsz:checked ~ .tab-content .pane-qjsz { display: block; }
        #jcff:checked ~ .tab-content .pane-jcff { display: block; }

        /* ----- 底部固定按钮 ----- */
        .bottom-buttons {
            display: flex;
            height: 54px;
            flex-shrink: 0;
            border-top: 1px solid #dde3e9;
            background: white;
        }
        .bottom-buttons button {
            flex: 1;
            height: 100%;
            border: none;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            outline: 2px solid transparent;
        }
        .bottom-buttons button:first-child {
            background-color: white;
            color: #1E9FFF;
            border-top: 2px solid #1E9FFF;
            border-right: 1px solid #cbd5e1;
        }
        .bottom-buttons button:last-child {
            background-color: #1E9FFF;
            color: white;
            border-top: 2px solid #1E9FFF;
            border-left: 1px solid #cbd5e1;
        }
        .bottom-buttons button:active {
            filter: brightness(0.95);
        }

        /* ========== 美化表单样式 (继承之前的美化) ========== */
        /* 卡片式 fieldset */
        fieldset {
            background: #ffffff;
            border: none;
            border-radius: 24px;
            padding: 1.5rem 1.8rem;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 20, 40, 0.04);
            transition: box-shadow 0.2s ease;
            margin-bottom: 1.5rem;
        }
        fieldset:last-child {
            margin-bottom: 0;
        }
        fieldset:hover {
            box-shadow: 0 12px 26px rgba(0, 0, 0, 0.04), 0 2px 8px rgba(0, 20, 40, 0.08);
        }

        /* 现代感 legend */
        legend {
            background: #ffffff;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 0.3rem 1.4rem;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            color: #0f172a;
            letter-spacing: 0.01em;
            margin-left: -0.3rem;
        }

        /* 通用行布局 */
        .form-row {
            display: flex;
            align-items: center;
            gap: 0.75rem 1rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .form-row:last-of-type {
            margin-bottom: 0;
        }

        /* 固定宽度标签 (用于抢单配置) */
        .form-label {
            width: 100px;
            text-align: right;
            font-weight: 500;
            color: #334155;
            font-size: 0.95rem;
            flex-shrink: 0;
        }

        /* 复选框网格 (两行三列) */
        .checkbox-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem 1rem;
            margin-bottom: 1.25rem;
            width: 100%;
        }
        .checkbox-item {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #f8fafc;
            padding: 0.4rem 1rem 0.4rem 0.8rem;
            border-radius: 30px;
            border: 1px solid #e9edf2;
            transition: all 0.15s;
            cursor: default;
        }
        .checkbox-item:hover {
            background: #ffffff;
            border-color: #cbd5e1;
        }
        .checkbox-grid .checkbox-item {
            flex: 0 0 calc(33.333% - 1rem);
            min-width: 140px;
        }

        /* 复选框本体 */
        .checkbox-item input[type="checkbox"] {
            width: 1.1rem;
            height: 1.1rem;
            accent-color: #2563eb;
            margin: 0;
            flex-shrink: 0;
            cursor: pointer;
        }
        .checkbox-item label {
            font-size: 0.95rem;
            color: #1e293b;
            font-weight: 450;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        /* 文本输入框通用设计 */
        input[type="text"] {
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 0.6rem 1rem;
            font-size: 0.95rem;
            background-color: #ffffff;
            transition: 0.15s ease;
            color: #0f172a;
            font-weight: 400;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.02);
        }
        input[type="text"]:focus {
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1), inset 0 1px 2px rgba(0,0,0,0.02);
        }
        input[type="text"]::placeholder {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        /* 尺寸变体 */
        .input-small {
            width: 100px;
            text-align: center;
        }
        .input-large {
            width: 260px;
        }

        /* 辅助文字 */
        .unit-text, .hint-text {
            color: #64748b;
            font-size: 0.9rem;
            font-weight: 400;
            white-space: nowrap;
        }
        .hint-text {
            color: #94a3b8;
            font-size: 0.85rem;
            background: #f8fafc;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            border: 1px solid #eef2f6;
        }

        /* 终点关键词区域对齐 */
        .keywords-fieldset .form-row .checkbox-item {
            flex: 0 0 130px;
            background: transparent;
            border: none;
            padding: 0;
            gap: 0.4rem;
        }
        .keywords-fieldset .form-row .checkbox-item:hover {
            background: transparent;
            border-color: transparent;
        }

        /* 其他类型特殊行 */
        .other-type-row {
            margin-top: 0.25rem;
            background: #fcfdff;
            padding: 0.6rem 1rem 0.6rem 0.8rem;
            border-radius: 40px;
            border: 1px dashed #d9e2ef;
        }
        .other-type-row .checkbox-item {
            background: transparent;
            border: none;
            padding: 0;
        }

        /* 本机信息 & 系统设置卡片内部微调 */
        .info-card p {
            background: #f1f5f9;
            padding: 0.8rem 1.2rem;
            border-radius: 18px;
            margin: 0.5rem 0 1rem 0;
            font-family: monospace;
            font-size: 1rem;
            border: 1px solid #e9edf2;
        }
        .info-card div {
            font-weight: 500;
            margin-top: 0.8rem;
        }
        .info-card div:first-of-type {
            margin-top: 0;
        }

        /* 系统设置简洁样式 */
        .sys-setting p {
            background: #eef9ff;
            padding: 1.2rem;
            border-radius: 20px;
            border: 1px solid #bdd9f0;
            color: #0369a1;
            font-size: 1rem;
        }

        /* 响应式调整 */
        @media (max-width: 650px) {
            fieldset { padding: 1.2rem 1.2rem; }
            .checkbox-grid .checkbox-item { flex: 0 0 calc(50% - 0.8rem); }
            .form-label { width: 80px; text-align: left; }
            .input-large { width: 200px; }
            .keywords-fieldset .form-row .checkbox-item { flex: 0 0 120px; }
        }
        @media (max-width: 450px) {
            .checkbox-grid .checkbox-item { flex: 0 0 100%; }
            .form-row { flex-direction: column; align-items: flex-start; }
            .form-label { width: auto; text-align: left; }
            .input-small { width: 100%; }
        }
    </style>
</head>
<body>

    <!-- 头部 -->
    <div class="app-header">
        <h3>战国</h3>
    </div>

    <!-- 隐藏的 radio 控制标签页 (放在头部与内容之间，方便CSS兄弟选择) -->
    <input type="radio" name="sexx" id="qdsz" checked>
    <input type="radio" name="sexx" id="qjsz">
    <input type="radio" name="sexx" id="jcff">

    <!-- 标签栏 -->
    <div class="tab-bar">
        <label for="qdsz">抢单大厅</label>
        <label for="qjsz">本机信息</label>
        <label for="jcff">教程方法</label>
    </div>

    <!-- 内容区域 (三个标签页) -->
    <div class="tab-content">
        <!-- 抢单大厅 - pane-qdsz (对应类名 nannan 保留以符合原CSS命名习惯，但实际控制用 pane-*) -->
        <div class="tab-pane pane-qdsz nannan">
            <!-- 抢单类型表单 -->
            <form action="">
                <fieldset>
                    <legend>🚖 抢单类型</legend>
                    <div class="checkbox-grid">
                        <span class="checkbox-item"><input type="checkbox" id="didikuaiche" name="vehicle" value="Bike"><label for="didikuaiche">快车</label></span>
                        <span class="checkbox-item"><input type="checkbox" id="tehuikuaiche" name="vehicle" value="Bike"><label for="tehuikuaiche">特惠快车</label></span>
                        <span class="checkbox-item"><input type="checkbox" id="diditekuai" name="vehicle" value="Bike"><label for="diditekuai">滴滴特快</label></span>
                        <span class="checkbox-item"><input type="checkbox" id="suixinjie" name="vehicle" value="Bike"><label for="suixinjie">随心接</label></span>
                        <span class="checkbox-item"><input type="checkbox" id="chenjipinche" name="vehicle" value="Bike"><label for="chenjipinche">城际拼车</label></span>
                        <span class="checkbox-item"><input type="checkbox" id="didipinche" name="vehicle" value="Bike"><label for="didipinche">滴滴拼车</label></span>
                    </div>
                    <div class="form-row other-type-row">
                        <span class="checkbox-item"><input type="checkbox" id="qitaleixing" name="vehicle" value="Bike"><label for="qitaleixing">其他类型</label></span>
                        <span class="unit-text">- 平均价格：</span>
                        <input type="text" id="qitajiage" class="input-small" value="" placeholder="例如 30">
                        <span class="unit-text">元以上</span>
                    </div>
                </fieldset>
            </form>

            <!-- 抢单配置表单 -->
            <form action="">
                <fieldset>
                    <legend>⚙️ 抢单配置</legend>
                    <div class="form-row">
                        <label for="jiange1" class="form-label">刷新间隔 :</label>
                        <input type="text" id="jiange1" class="input-small" value="" placeholder="500">
                        <span class="unit-text">—</span>
                        <input type="text" id="jiange2" class="input-small" value="" placeholder="800">
                        <span class="unit-text">毫秒</span>
                    </div>
                    <div class="form-row">
                        <label for="shezhijuli" class="form-label">接人距离 :</label>
                        <input type="text" id="shezhijuli" class="input-small" value="" placeholder="例如 5">
                        <span class="unit-text">公里以内</span>
                    </div>
                    <div class="form-row">
                        <label for="shezhijiage" class="form-label">抢单价格 :</label>
                        <input type="text" id="shezhijiage" class="input-small" value="" placeholder="例如 20">
                        <span class="unit-text">元以上</span>
                    </div>
                </fieldset>
            </form>

            <!-- 终点关键词表单 -->
            <form action="" class="keywords-fieldset">
                <fieldset>
                    <legend>📍 终点关键词</legend>
                    <div class="form-row">
                        <span class="checkbox-item"><input type="checkbox" id="bqzdbox" name="vehicle" value="Bike"><label for="bqzdbox">不抢终点 :</label></span>
                        <input type="text" id="zbjhs" class="input-large" value="" placeholder="例如 机场#火车站">
                        <span class="hint-text">用#号隔开</span>
                    </div>
                    <div class="form-row">
                        <span class="checkbox-item"><input type="checkbox" id="zqzdbox" name="vehicle" value="Bike"><label for="zqzdbox">只抢终点 :</label></span>
                        <input type="text" id="zqzdwz" class="input-large" value="" placeholder="例如 软件园#医院">
                        <span class="hint-text">用#号隔开</span>
                    </div>
                </fieldset>
            </form>
        </div>

        <!-- 本机信息 - pane-qjsz (原类 nvnv) -->
        <div class="tab-pane pane-qjsz nvnv info-card">
            <fieldset>
                <legend>📟 本机信息</legend>
                <div>本机IP：<p id="bjip">—</p></div>
                <div>本机名称：<p id="bjmc">—</p></div>
                <div>本机型号：<p id="bjxh">—</p></div>
                <div>本机分辨率：<p id="bjfbl">—</p></div>
            </fieldset>
        </div>

        <!-- 教程方法 / 系统设置 - pane-jcff (原类 jyjy) -->
        <div class="tab-pane pane-jcff jyjy sys-setting">
            <fieldset>
                <legend>📘 教程方法</legend>
                <p>本辅助已全分辨率适配，<br>请确保HID连接。</p>
                <!-- 原内容较少，适当扩充说明 -->
                <p style="margin-top:1rem; background: #f1f5f9; color: #334155;">
                    详细教程请查看官方文档。<br>
                    如有问题请联系客服。
                </p>
            </fieldset>
        </div>
    </div>

    <!-- 底部按钮 -->
    <div class="bottom-buttons">
        <button id="guanbi" onclick="wclose()" type="button">退出</button>
        <button id="queding" onclick="submit()" type="button">运行</button>
    </div>

    <script type="text/javascript">
        // 完全保留原有逻辑，仅优化了UI结构，所有ID均未改变
        window.onload = function () {
            console.log("窗口加载成功了");
            if (typeof airscript !== 'undefined') {
                airscript.call("加载", "成功");
            }

            // 读取localStorage并设置各字段
            function setCheckbox(id, key) {
                var val = localStorage.getItem(key);
                var el = document.getElementById(id);
                if (el) {
                    el.checked = (val === "true");
                    console.log(key + " = " + el.checked);
                }
            }
            function setInput(id, key, defaultValue) {
                var val = localStorage.getItem(key);
                var el = document.getElementById(id);
                if (el) {
                    if (val) {
                        el.value = val;
                    } else if (defaultValue !== undefined) {
                        el.value = defaultValue;
                    }
                    console.log(key + " = " + el.value);
                }
            }

            setCheckbox("didikuaiche", "didikuaiche");
            setCheckbox("tehuikuaiche", "tehuikuaiche");
            setCheckbox("diditekuai", "diditekuai");
            setCheckbox("suixinjie", "suixinjie");
            setCheckbox("chenjipinche", "chenjipinche");
            setCheckbox("didipinche", "didipinche");
            setCheckbox("qitaleixing", "qitaleixing");
            setCheckbox("bqzdbox", "bqzdbox");
            setCheckbox("zqzdbox", "zqzdbox");

            setInput("qitajiage", "qitajiage", "5");
            setInput("jiange1", "jiange1", "5000");
            setInput("jiange2", "jiange2", "6000");
            setInput("shezhijuli", "shezhijuli", "10");
            setInput("shezhijiage", "shezhijiage", "10");
            setInput("zbjhs", "zbjhs", "");
            setInput("zqzdwz", "zqzdwz", "");
        };

        function submit() {
            console.log("点击了确定");
            // 收集checkbox
            var didikuaiche = document.getElementById("didikuaiche").checked;
            var tehuikuaiche = document.getElementById("tehuikuaiche").checked;
            var diditekuai = document.getElementById("diditekuai").checked;
            var suixinjie = document.getElementById("suixinjie").checked;
            var chenjipinche = document.getElementById("chenjipinche").checked;
            var didipinche = document.getElementById("didipinche").checked;
            var qitaleixing = document.getElementById("qitaleixing").checked;
            var bqzdbox = document.getElementById("bqzdbox").checked;
            var zqzdbox = document.getElementById("zqzdbox").checked;

            // 收集输入框
            var jiange1 = document.getElementById("jiange1").value;
            var jiange2 = document.getElementById("jiange2").value;
            var shezhijuli = document.getElementById("shezhijuli").value;
            var shezhijiage = document.getElementById("shezhijiage").value;
            var qitajiage = document.getElementById("qitajiage").value;
            var zbjhs = document.getElementById("zbjhs").value;
            var zqzdwz = document.getElementById("zqzdwz").value;

            // 保存到localStorage
            localStorage.setItem("didikuaiche", didikuaiche);
            localStorage.setItem("tehuikuaiche", tehuikuaiche);
            localStorage.setItem("diditekuai", diditekuai);
            localStorage.setItem("suixinjie", suixinjie);
            localStorage.setItem("chenjipinche", chenjipinche);
            localStorage.setItem("didipinche", didipinche);
            localStorage.setItem("qitaleixing", qitaleixing);
            localStorage.setItem("bqzdbox", bqzdbox);
            localStorage.setItem("zqzdbox", zqzdbox);
            localStorage.setItem("qitajiage", qitajiage);
            localStorage.setItem("jiange1", jiange1);
            localStorage.setItem("jiange2", jiange2);
            localStorage.setItem("shezhijuli", shezhijuli);
            localStorage.setItem("shezhijiage", shezhijiage);
            localStorage.setItem("zbjhs", zbjhs);
            localStorage.setItem("zqzdwz", zqzdwz);

            var data = {
                didikuaiche, tehuikuaiche, diditekuai, suixinjie, chenjipinche, didipinche,
                qitaleixing, bqzdbox, zqzdbox, qitajiage, jiange1, jiange2, shezhijuli, shezhijiage, zbjhs, zqzdwz
            };
            console.log(data);
            if (typeof airscript !== 'undefined') {
                airscript.call("submit", JSON.stringify(data));
                airscript.close();
            } else {
                alert("数据已保存 (演示模式)");
            }
        }

        function wclose() {
            var guan = document.getElementById("guanbi").value;
            if (typeof airscript !== 'undefined') {
                airscript.call("guan", guan);
                airscript.close();
            } else {
                // 模拟关闭
                window.close?.();
            }
        }

        // 以下方法供外部调用更新本机信息
        function xgip(xip) { document.getElementById("bjip").innerHTML = xip; }
        function xgmc(xip) { document.getElementById("bjmc").innerHTML = xip; }
        function xgxh(xip) { document.getElementById("bjxh").innerHTML = xip; }
        function xgfbl(xip) { document.getElementById("bjfbl").innerHTML = xip; }

        // 暴露给外部（如果airscript环境需要）
        window.xgip = xgip;
        window.xgmc = xgmc;
        window.xgxh = xgxh;
        window.xgfbl = xgfbl;
    </script>
</body>
</html>
